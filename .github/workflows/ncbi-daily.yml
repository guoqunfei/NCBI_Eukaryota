name: NCBI Eukaryota Daily Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间 06:00 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（忽略缓存）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  TAXONKIT_VERSION: "0.15.1"
  DATASETS_VERSION: "16.38.1"
  RESULTS_DIR: "results"

jobs:
  ncbi-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

    steps:
      # ------------------------------------------------------------------
      # 1. 检出代码
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. 安装系统依赖
      # ------------------------------------------------------------------
      - name: Install jq, wget, unzip, openssl
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq wget unzip curl openssl

      - name: Install taxonkit
        run: |
          TAXONKIT_URL="https://github.com/shenwei356/taxonkit/releases/download/v0.15.1/taxonkit_linux_amd64.tar.gz"
          echo "Downloading taxonkit from: $TAXONKIT_URL"
          if ! wget --tries=3 --retry-connrefused --timeout=30 -q "$TAXONKIT_URL" -O taxonkit.tar.gz; then
            echo "wget failed, trying curl..."
            curl -L --retry 3 --max-time 30 -o taxonkit.tar.gz "$TAXONKIT_URL"
          fi
          if [ ! -s taxonkit.tar.gz ]; then
            echo "ERROR: Failed to download taxonkit"
            exit 1
          fi
          tar -xzf taxonkit.tar.gz
          sudo mv taxonkit /usr/local/bin/
          sudo chmod +x /usr/local/bin/taxonkit
          taxonkit version

      - name: Install NCBI datasets CLI
        run: |
          NCBI_URL="https://ftp.ncbi.nlm.nih.gov/pub/datasets/command-line/LATEST/linux-amd64/datasets"
          echo "Downloading NCBI datasets CLI from: $NCBI_URL"
          if ! wget --tries=3 --retry-connrefused --timeout=30 -q "$NCBI_URL" -O datasets; then
            echo "wget failed, trying curl..."
            curl -L --retry 3 --max-time 30 -o datasets "$NCBI_URL"
          fi
          if [ ! -s datasets ]; then
            echo "ERROR: Failed to download NCBI datasets CLI"
            exit 1
          fi
          sudo mv datasets /usr/local/bin/
          sudo chmod +x /usr/local/bin/datasets
          datasets version

      # ------------------------------------------------------------------
      # 3. 配置 Python 环境
      # ------------------------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: |
          pip install --quiet pandas openpyxl

      # ------------------------------------------------------------------
      # 4. 缓存 taxonkit taxdump 数据库
      # ------------------------------------------------------------------
      - name: Cache taxonkit taxdump
        id: cache-taxdump
        uses: actions/cache@v4
        with:
          path: $HOME/.taxonkit
          key: taxonkit-taxdump-v3-${{ runner.os }}-${{ hashFiles('**/run_pipeline_final.sh') }}
          restore-keys: |
            taxonkit-taxdump-v3-${{ runner.os }}-

      - name: Prepare taxonkit taxonomy data
        run: |
          set -euo pipefail
          TAXDUMP_URL="https://ftp.ncbi.nih.gov/pub/taxonomy/taxdump.tar.gz"
          echo "HOME=$HOME"
          mkdir -p "$HOME/.taxonkit"
          cd "$HOME/.taxonkit"
          
          dmp_ok=true
          for f in names.dmp nodes.dmp delnodes.dmp merged.dmp; do
            if [ ! -f "$f" ]; then
              echo "  缺少: $f"
              dmp_ok=false
            fi
          done
          
          if [ "$dmp_ok" = true ]; then
            echo "✅ taxdump 数据库已存在且完整，跳过下载"
            ls -lh "$HOME/.taxonkit"
          else
            echo "=== 下载 taxonkit taxdump 数据库 ==="
            cd "$HOME/.taxonkit"
            rm -f taxdump.tar.gz
            
            if ! curl -fL --retry 5 --retry-delay 5 --max-time 300 -o taxdump.tar.gz "$TAXDUMP_URL"; then
              echo "curl failed, trying wget..."
              if ! wget --tries=5 --retry-connrefused --timeout=60 -q "$TAXDUMP_URL" -O taxdump.tar.gz; then
                echo "ERROR: Failed to download taxdump.tar.gz"
                ls -la "$HOME" || true
                exit 1
              fi
            fi
            
            if [ ! -s taxdump.tar.gz ]; then
              echo "ERROR: taxdump.tar.gz is empty or missing"
              ls -la "$HOME/.taxonkit" || true
              exit 1
            fi
            echo "✅ 下载成功 (大小: $(du -h taxdump.tar.gz | cut -f1))"
            
            echo "开始解压..."
            tar -xzf taxdump.tar.gz -C "$HOME/.taxonkit" --wildcards 'names.dmp' 'nodes.dmp' 'delnodes.dmp' 'merged.dmp' || {
              echo "Extraction failed. Showing archive contents:"
              tar -tzf taxdump.tar.gz | head -n 50 || true
              exit 1
            }
            
            echo "=== 验证解压后的文件 ==="
            for f in names.dmp nodes.dmp delnodes.dmp merged.dmp; do
              if [ -f "$f" ]; then
                echo "  ✅ $f ($(wc -c < $f) bytes)"
              else
                echo "  ❌ $f 未找到"
                exit 1
              fi
            done
            
            echo "=== 解压完成 ==="
            ls -lh "$HOME/.taxonkit"
          fi

      # ------------------------------------------------------------------
      # 5. 运行主脚本
      # ------------------------------------------------------------------
      - name: Run NCBI pipeline
        id: pipeline
        run: |
          bash run_pipeline_final.sh || {
            EXIT_CODE=$?
            echo ""
            echo "=========================================="
            echo "Pipeline failed with exit code: $EXIT_CODE"
            echo "=========================================="
            echo ""
            echo "--- Last 100 lines of pipeline log ---"
            LOGFILE=$(ls -t pipeline_*.log 2>/dev/null | head -n 1)
            if [ -n "$LOGFILE" ]; then
              tail -n 100 "$LOGFILE" || true
            else
              echo "No log file found"
            fi
            echo ""
            echo "--- Files in workspace ---"
            ls -la || true
            echo ""
            echo "--- Error files ---"
            cat taxonkit_list.err 2>/dev/null || true
            cat *.err 2>/dev/null || true
            echo ""
            echo "--- Checking key outputs ---"
            wc -l Eukaryota_nodes.txt 2>/dev/null || echo "Eukaryota_nodes.txt: not found or empty"
            wc -l Eukaryota_species_taxids.txt 2>/dev/null || echo "Eukaryota_species_taxids.txt: not found or empty"
            wc -l Eukaryota_taxonomy.tsv 2>/dev/null || echo "Eukaryota_taxonomy.tsv: not found or empty"
            echo ""
            echo "--- Checking datasets availability ---"
            which datasets 2>/dev/null && datasets --help 2>&1 | head -n 5 || echo "datasets not available"
            exit $EXIT_CODE
          }

      # ------------------------------------------------------------------
      # 6. 收集结果和日志
      # ------------------------------------------------------------------
      - name: Collect results
        id: collect
        if: always()
        run: |
          TODAY=$(date +%Y-%m-%d)
          RESULTS_SUBDIR="${RESULTS_DIR}/${TODAY}"
          mkdir -p "${RESULTS_SUBDIR}"

          cp -f Eukaryota_assemblies_summary.xlsx "${RESULTS_SUBDIR}/" 2>/dev/null || true
          cp -f NCBI_Eukaryota_Taxonomy_Summary.xlsx "${RESULTS_SUBDIR}/" 2>/dev/null || true
          cp -f NCBI_Eukaryota_Taxonomy_Summary.txt "${RESULTS_SUBDIR}/" 2>/dev/null || true
          cp -f pipeline_*.log "${RESULTS_SUBDIR}/" 2>/dev/null || true

          STATS_FILE="${RESULTS_SUBDIR}/summary.txt"
          echo "NCBI Eukaryota Pipeline Daily Report - ${TODAY}" > "${STATS_FILE}"
          echo "================================================" >> "${STATS_FILE}"
          echo "Run Date: ${TODAY}" >> "${STATS_FILE}"
          echo "Run ID: ${{ github.run_id }}" >> "${STATS_FILE}"
          echo "Actor: ${{ github.actor }}" >> "${STATS_FILE}"
          echo "" >> "${STATS_FILE}"

          if [ -f "Eukaryota_assemblies_stats.tsv" ]; then
            ASM_COUNT=$(wc -l < Eukaryota_assemblies_stats.tsv 2>/dev/null || echo 0)
            echo "Assembly Records: ${ASM_COUNT}" >> "${STATS_FILE}"
          fi

          if [ -f "NCBI_Eukaryota_Taxonomy_Summary.txt" ]; then
            TAX_COUNT=$(tail -n +2 NCBI_Eukaryota_Taxonomy_Summary.txt | wc -l 2>/dev/null || echo 0)
            echo "Taxonomy Summary Records: ${TAX_COUNT}" >> "${STATS_FILE}"
          fi

          echo "" >> "${STATS_FILE}"
          echo "Artifacts:" >> "${STATS_FILE}"
          ls -lh "${RESULTS_SUBDIR}/" >> "${STATS_FILE}"

          echo "results_dir=${RESULTS_SUBDIR}" >> $GITHUB_OUTPUT
          echo "today=${TODAY}" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 7. 上传 Artifact（保留 90 天）
      # ------------------------------------------------------------------
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ncbi-results-${{ steps.collect.outputs.today }}
          path: |
            Eukaryota_assemblies_summary.xlsx
            NCBI_Eukaryota_Taxonomy_Summary.xlsx
            NCBI_Eukaryota_Taxonomy_Summary.txt
            pipeline_*.log
            results/**/summary.txt
            *.txt
            *.tsv
            *.jsonl
            Eukaryota_nodes.txt
            Eukaryota_species_taxids.txt
          retention-days: 90
          if-no-files-found: warn

      # ------------------------------------------------------------------
      # 8. 自动提交结果到仓库
      # ------------------------------------------------------------------
      - name: Auto-commit results
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[NCBI Daily] ${{ steps.collect.outputs.today }} pipeline results"
          file_pattern: |
            results/**/*.xlsx
            results/**/*.txt
            results/**/*.log
          branch: main
        continue-on-error: true

      # ------------------------------------------------------------------
      # 9. 邮件成功通知（丰富统计 + 自动兼容 SSL/STARTTLS）
      # ------------------------------------------------------------------
      - name: Send success email via Python
        if: steps.pipeline.outcome == 'success' && env.SMTP_SERVER != ''
        run: |
          python3 << 'PYEOF'
          import smtplib, os, ssl, glob
          from datetime import datetime, timedelta
          from collections import defaultdict, Counter
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication
          import pandas as pd
          
          # ------------------------------------------------------------------
          # 配置读取
          # ------------------------------------------------------------------
          server   = os.environ['SMTP_SERVER']
          port     = int(os.environ['SMTP_PORT'])
          user     = os.environ['SMTP_USER']
          password = os.environ['SMTP_PASSWORD']
          to       = os.environ['EMAIL_TO']
          from_addr= os.environ['EMAIL_FROM']
          today_str= os.environ['TODAY']
          repo     = os.environ['GITHUB_REPO']
          run_id   = os.environ['GITHUB_RUN_ID']
          
          today = datetime.strptime(today_str, '%Y-%m-%d').date()
          
          # ------------------------------------------------------------------
          # 读取当天数据
          # ------------------------------------------------------------------
          raw_file = f"results/{today_str}/Eukaryota_assemblies_summary.xlsx"
          if not os.path.exists(raw_file):
              raw_file = "Eukaryota_assemblies_summary.xlsx"
          
          df_raw = pd.read_excel(raw_file, sheet_name='All_Raw', dtype=str)
          df_unique = pd.read_excel(raw_file, sheet_name='Species_Unique', dtype=str)
          
          # 解析日期
          df_raw['ReleaseDate'] = pd.to_datetime(df_raw['Assembly Release Date'], errors='coerce').dt.date
          df_raw['TaxID'] = df_raw['Taxonomic ID'].astype(str)
          
          total_raw = len(df_raw)
          total_unique = len(df_unique)
          
          # ------------------------------------------------------------------
          # 读取历史数据（构建历史物种集合）
          # ------------------------------------------------------------------
          historical_taxids = set()
          history_files = glob.glob("results/*/Eukaryota_assemblies_summary.xlsx")
          for hfile in history_files:
              if today_str in hfile:
                  continue
              try:
                  hdf = pd.read_excel(hfile, sheet_name='Species_Unique', dtype=str, usecols=['Taxonomic ID'])
                  historical_taxids.update(hdf['Taxonomic ID'].dropna().astype(str).tolist())
              except Exception:
                  pass
          
          # ------------------------------------------------------------------
          # 按时间窗口统计
          # ------------------------------------------------------------------
          windows = [
              ('今日', today, '#e8f5e9'),
              ('本周', today - timedelta(days=7), '#f5f5f5'),
              ('本月', today - timedelta(days=30), '#f5f5f5'),
              ('本年', today - timedelta(days=365), '#f5f5f5'),
          ]
          
          stats_rows = []
          for name, start_date, color in windows:
              mask = df_raw['ReleaseDate'] >= start_date
              subset = df_raw[mask]
              
              new_assemblies = len(subset)
              species_set = set(subset['TaxID'].dropna())
              num_species = len(species_set)
              first_time = len(species_set - historical_taxids)
              
              stats_rows.append((name, new_assemblies, num_species, first_time, color))
          
          # ------------------------------------------------------------------
          # 按 Kingdom 分布
          # ------------------------------------------------------------------
          kingdom_counts = Counter(df_raw['Subkingdom'].fillna('Unknown'))
          kingdom_html = ""
          for kingdom, count in kingdom_counts.most_common():
              pct = count / total_raw * 100
              kingdom_html += f'<tr><td>{kingdom}</td><td>{count}</td><td>{pct:.1f}%</td></tr>'
          
          # ------------------------------------------------------------------
          # 按 Assembly Level 分布
          # ------------------------------------------------------------------
          level_counts = Counter(df_raw['Assembly Level'].fillna('Unknown'))
          level_html = ""
          for level, count in level_counts.most_common():
              pct = count / total_raw * 100
              level_html += f'<tr><td>{level}</td><td>{count}</td><td>{pct:.1f}%</td></tr>'
          
          # ------------------------------------------------------------------
          # 参考基因组统计
          # ------------------------------------------------------------------
          ref_genomes = df_raw[df_raw['RefSeq Category'].str.strip().str.lower() == 'reference genome']
          ref_count = len(ref_genomes)
          
          # ------------------------------------------------------------------
          # 生成 HTML 邮件
          # ------------------------------------------------------------------
          html = f"""<!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <style>
            body {{ font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }}
            h2 {{ color: #2c5282; border-bottom: 3px solid #4299e1; padding-bottom: 10px; margin-top: 30px; }}
            h3 {{ color: #2d3748; margin-top: 25px; font-size: 16px; }}
            table {{ width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 14px; }}
            th {{ background: #2c5282; color: white; padding: 12px 8px; text-align: left; font-weight: 600; }}
            td {{ padding: 10px 8px; border-bottom: 1px solid #e2e8f0; }}
            tr:hover {{ background: #f7fafc; }}
            .highlight {{ background: #c6f6d5; font-weight: 600; }}
            .metric-card {{ background: #edf2f7; border-left: 4px solid #4299e1; padding: 15px; margin: 10px 0; border-radius: 4px; }}
            .metric-value {{ font-size: 24px; font-weight: bold; color: #2c5282; }}
            .metric-label {{ font-size: 12px; color: #718096; text-transform: uppercase; letter-spacing: 0.5px; }}
            .footer {{ margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #718096; }}
            a {{ color: #3182ce; text-decoration: none; }}
            a:hover {{ text-decoration: underline; }}
            .badge {{ display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }}
            .badge-green {{ background: #c6f6d5; color: #22543d; }}
            .badge-blue {{ background: #bee3f8; color: #2a4365; }}
            .badge-purple {{ background: #e9d8fd; color: #553c9a; }}
          </style>
          </head>
          <body>
          
          <h2>📊 NCBI 已发表真核生物基因组信息统计</h2>
          <p style="color:#718096; font-size:14px;">统计日期：<strong>{today_str}</strong> | 数据来源：NCBI Datasets & Taxonomy</p>
          
          <div style="display:flex; gap:15px; flex-wrap:wrap; margin:20px 0;">
            <div class="metric-card" style="flex:1; min-width:150px;">
              <div class="metric-label">累计发表基因组</div>
              <div class="metric-value">{total_raw:,}</div>
            </div>
            <div class="metric-card" style="flex:1; min-width:150px; border-left-color:#48bb78;">
              <div class="metric-label">去重后物种数</div>
              <div class="metric-value">{total_unique:,}</div>
            </div>
            <div class="metric-card" style="flex:1; min-width:150px; border-left-color:#9f7aea;">
              <div class="metric-label">参考基因组</div>
              <div class="metric-value">{ref_count:,}</div>
              <span class="badge badge-purple">RefSeq</span>
            </div>
          </div>
          
          <h3>🆕 新增基因组统计</h3>
          <table>
            <tr>
              <th style="width:15%">时间窗口</th>
              <th style="width:25%">新增基因组数</th>
              <th style="width:30%">覆盖物种数</th>
              <th style="width:30%">首次发表物种数</th>
            </tr>
          """
          
          for name, assemblies, species, first_time, color in stats_rows:
              html += f"""
            <tr style="background:{color};">
              <td><strong>{name}</strong></td>
              <td>{assemblies:,} <span class="badge badge-green">+{assemblies}</span></td>
              <td>{species:,}</td>
              <td>{first_time:,} <span class="badge badge-blue">首报</span></td>
            </tr>
          """
          
          html += f"""
          </table>
          <p style="font-size:12px; color:#718096;">💡 <em>"首次发表物种"指该物种在 NCBI 历史上首次出现基因组组装记录。</em></p>
          
          <h3>🧬 分类群分布（Kingdom）</h3>
          <table>
            <tr><th>分类群</th><th>基因组数</th><th>占比</th></tr>
            {kingdom_html}
          </table>
          
          <h3>🔬 组装水平分布（Assembly Level）</h3>
          <table>
            <tr><th>组装水平</th><th>基因组数</th><th>占比</th></tr>
            {level_html}
          </table>
          
          <h3>📁 结果文件</h3>
          <ul>
            <li><a href="https://github.com/{repo}/blob/main/results/{today_str}/Eukaryota_assemblies_summary.xlsx">Eukaryota_assemblies_summary.xlsx</a> — 全部基因组记录（All_Raw + Species_Unique 双 Sheet）</li>
            <li><a href="https://github.com/{repo}/blob/main/results/{today_str}/NCBI_Eukaryota_Taxonomy_Summary.xlsx">NCBI_Eukaryota_Taxonomy_Summary.xlsx</a> — 门/纲宏观统计</li>
          </ul>
          
          <h3>🔗 快速链接</h3>
          <p>
            <a href="https://github.com/{repo}/actions/runs/{run_id}">📋 查看 Actions 运行详情</a> &nbsp;|&nbsp;
            <a href="https://github.com/{repo}/actions/runs/{run_id}/artifacts">📦 下载 Artifact</a> &nbsp;|&nbsp;
            <a href="https://github.com/{repo}/tree/main/results/{today_str}">📂 浏览结果目录</a>
          </p>
          
          <div class="footer">
            <p>此邮件由 GitHub Actions 自动发送 | 仓库：{repo} | Run ID：{run_id}</p>
            <p>如有问题，请在仓库中提交 Issue 或联系管理员。</p>
          </div>
          
          </body>
          </html>
          """
          
          # ------------------------------------------------------------------
          # 构造邮件并发送
          # ------------------------------------------------------------------
          msg = MIMEMultipart()
          msg['From'] = from_addr
          msg['To'] = to
          msg['Subject'] = f'{today_str} | NCBI已发表真核生物基因组信息统计'
          msg.attach(MIMEText(html, 'html', 'utf-8'))
          
          # 附件
          for fname in [f"results/{today_str}/Eukaryota_assemblies_summary.xlsx",
                        f"results/{today_str}/NCBI_Eukaryota_Taxonomy_Summary.xlsx"]:
              if os.path.exists(fname):
                  with open(fname, 'rb') as f:
                      att = MIMEApplication(f.read(), Name=os.path.basename(fname))
                      att['Content-Disposition'] = f'attachment; filename="{os.path.basename(fname)}"'
                      msg.attach(att)
          
          # 自动适配 SSL/STARTTLS
          s = None
          try:
              s = smtplib.SMTP_SSL(server, port, timeout=30)
          except ssl.SSLError:
              s = smtplib.SMTP(server, port, timeout=30)
              s.starttls()
          
          s.login(user, password)
          s.sendmail(from_addr, [to], msg.as_string())
          s.quit()
          print("✅ 邮件发送成功")
          PYEOF
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          TODAY: ${{ steps.collect.outputs.today }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      # ------------------------------------------------------------------
      # 10. 邮件失败通知
      # ------------------------------------------------------------------
      - name: Send failure email via Python
        if: steps.pipeline.outcome == 'failure' && env.SMTP_SERVER != ''
        run: |
          python3 << 'PYEOF'
          import smtplib, os, ssl
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          
          server   = os.environ['SMTP_SERVER']
          port     = int(os.environ['SMTP_PORT'])
          user     = os.environ['SMTP_USER']
          password = os.environ['SMTP_PASSWORD']
          to       = os.environ['EMAIL_TO']
          from_addr= os.environ['EMAIL_FROM']
          today    = os.environ['TODAY']
          repo     = os.environ['GITHUB_REPO']
          run_id   = os.environ['GITHUB_RUN_ID']
          
          msg = MIMEMultipart()
          msg['From'] = from_addr
          msg['To'] = to
          msg['Subject'] = f'{today} | NCBI基因组统计 — 运行失败告警'
          
          body = f"""<!DOCTYPE html>
          <html><body style="font-family:Arial,sans-serif; max-width:600px; margin:0 auto;">
          <h2 style="color:#c53030;">❌ NCBI Eukaryota 每日统计失败</h2>
          <p><strong>日期：</strong>{today}</p>
          <p><strong>状态：</strong>Pipeline 执行失败</p>
          <hr>
          <p>请尽快查看日志排查问题：</p>
          <p><a href="https://github.com/{repo}/actions/runs/{run_id}" style="background:#c53030; color:white; padding:10px 20px; text-decoration:none; border-radius:4px; display:inline-block;">查看 Actions 错误日志</a></p>
          <hr>
          <p style="font-size:12px; color:#718096;">此邮件由 GitHub Actions 自动发送</p>
          </body></html>
          """
          msg.attach(MIMEText(body, 'html', 'utf-8'))
          
          s = None
          try:
              s = smtplib.SMTP_SSL(server, port, timeout=30)
          except ssl.SSLError:
              s = smtplib.SMTP(server, port, timeout=30)
              s.starttls()
          
          s.login(user, password)
          s.sendmail(from_addr, [to], msg.as_string())
          s.quit()
          print("✅ 告警邮件发送成功")
          PYEOF
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          TODAY: ${{ steps.collect.outputs.today }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}

      # ------------------------------------------------------------------
      # 11. 钉钉成功通知
      # ------------------------------------------------------------------
      - name: Send DingTalk success notification
        if: steps.pipeline.outcome == 'success' && env.DINGTALK_WEBHOOK != ''
        run: |
          if [ -n "${{ secrets.DINGTALK_SECRET }}" ]; then
            timestamp=$(date +%s)000
            secret="${{ secrets.DINGTALK_SECRET }}"
            sign=$(echo -n "${timestamp}\n${secret}" | openssl dgst -sha256 -hmac "${secret}" -binary | base64)
            webhook="${{ secrets.DINGTALK_WEBHOOK }}&timestamp=${timestamp}&sign=${sign}"
          else
            webhook="${{ secrets.DINGTALK_WEBHOOK }}"
          fi
          
          curl -s "${webhook}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"NCBI Daily 完成\",
                \"text\": \"## ✅ NCBI Eukaryota 每日统计完成\n\n**日期：** ${{ steps.collect.outputs.today }}\n**状态：** 成功\n\n**统计摘要：**\n- Assembly 原始记录见 Excel\n- 门/纲统计见 Summary\n\n[查看 Actions 详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n[查看结果文件](https://github.com/${{ github.repository }}/tree/main/results/${{ steps.collect.outputs.today }})\n\n> 来自 GitHub Actions 自动推送\n"
              }
            }"

      # ------------------------------------------------------------------
      # 12. 钉钉失败通知
      # ------------------------------------------------------------------
      - name: Send DingTalk failure notification
        if: steps.pipeline.outcome == 'failure' && env.DINGTALK_WEBHOOK != ''
        run: |
          if [ -n "${{ secrets.DINGTALK_SECRET }}" ]; then
            timestamp=$(date +%s)000
            secret="${{ secrets.DINGTALK_SECRET }}"
            sign=$(echo -n "${timestamp}\n${secret}" | openssl dgst -sha256 -hmac "${secret}" -binary | base64)
            webhook="${{ secrets.DINGTALK_WEBHOOK }}&timestamp=${timestamp}&sign=${sign}"
          else
            webhook="${{ secrets.DINGTALK_WEBHOOK }}"
          fi
          
          curl -s "${webhook}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"NCBI Daily 失败\",
                \"text\": \"## ❌ NCBI Eukaryota 每日统计失败\n\n**日期：** ${{ steps.collect.outputs.today }}\n**状态：** 失败\n\n[查看错误日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n> 请尽快排查\n"
              }
            }"

      # ------------------------------------------------------------------
      # 13. 最终失败标记
      # ------------------------------------------------------------------
      - name: Mark as failed
        if: failure() && (steps.pipeline.outcome == 'failure' || steps.pipeline.outcome == 'cancelled')
        run: |
          echo "Pipeline failed. Check logs for details."
          exit 1
